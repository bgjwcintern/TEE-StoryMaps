<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>2020 Census Summary</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Avenir Next", Arial, sans-serif;
      background: #205493;
    }

    #player-container {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .storymap-note {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.95);
      color: #222;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
  </style>

  <link
    href="https://bao.arcgis.com/InfographicsPlayer/BAMobile/25.R02/reportPlayer/css/styles.css"
    rel="stylesheet"
  />

  <script>
    const urlVars = {};
    const q = location.href.includes("?") ? location.href.replace(/.+\?/, "") : null;

    if (q) {
      q.split("&").forEach((p) => {
        const ps = p.split("=");
        urlVars[ps[0].toLowerCase()] = ps[1];
      });
    }

    function _getUrlVar(name) {
      return urlVars[name.toLowerCase()];
    }

    window.runReportPlayerParams = {
      buildPath: "https://bao.arcgis.com/InfographicsPlayer/BAMobile/25.R02/reportPlayer",

      reportDataJson: {
        /*
          PASTE YOUR ENTIRE ORIGINAL reportDataJson HERE.
          Do not shorten it.
          Do not remove reportObject or templateJson.
          Do not leave only the title.
        */

        "isJson": true,
        "portalUrl": "https://www.arcgis.com",
        "geoenrichmentUrl": null,
        "geometryServiceUrl": null,
        "printMapTaskUrl": null,
        "countryID": "US",
        "hierarchy": "",
        "reportTitle": "2020 Census Summary",

        "reportObject": {
          "title": "2020 Census Summary"
        },

        "templateJson": {}
      }
    };
  </script>

  <script
    src="https://bao.arcgis.com/InfographicsPlayer/BAMobile/25.R02/reportPlayer/scripts/InfographicFromJSON.js">
  </script>
</head>

<body>
  <div id="player-container">
    <div class="storymap-note">
      Interactive census infographic
    </div>
  </div>
</body>
</html>
