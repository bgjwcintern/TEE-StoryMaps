<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>2020 Census Summary</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Avenir Next", Arial, sans-serif;
      background: #205493;
    }

    /* Full-page container for StoryMaps embed */
    #app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* Optional small title for users inside StoryMap */
    .storymap-label {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.92);
      color: #222;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* Mobile adjustment */
    @media (max-width: 768px) {
      .storymap-label {
        font-size: 12px;
        padding: 6px 10px;
        max-width: 80%;
      }
    }
  </style>

  <link
    href="https://bao.arcgis.com/InfographicsPlayer/BAMobile/25.R02/reportPlayer/css/styles.css"
    rel="stylesheet"
  />
  <script
    defer
    src="https://bao.arcgis.com/InfographicsPlayer/BAMobile/25.R02/reportPlayer/scripts/InfographicFromJSON.js"
  ></script>

  <script>
    const urlVars = {};
    const q = location.href.includes("?") ? location.href.replace(/.+\?/, "") : null;

    if (q) {
      q.split("&").forEach((p) => {
        const ps = p.split("=");
        urlVars[ps[0].toLowerCase()] = ps[1];
      });
    }

    function _getUrlVar(name) {
      return urlVars[name.toLowerCase()];
    }

    /* This is what Esri's InfographicFromJSON.js reads */
    window.runReportPlayerParams = {
      buildPath: "https://bao.arcgis.com/InfographicsPlayer/BAMobile/25.R02/reportPlayer",

      reportDataJson: {
        "isJson": true,
        "portalUrl": "https://www.arcgis.com",
        "geoenrichmentUrl": null,
        "geometryServiceUrl": null,
        "printMapTaskUrl": null,
        "countryID": "US",
        "hierarchy": "",
        "reportTitle": "2020 Census Summary",

        /*
          IMPORTANT:
          Paste your ENTIRE original reportObject + templateJson + all remaining JSON
          from your existing file here.
          Keep everything exactly as it is in your source file.
        */

        "reportObject": {
          "title": "2020 Census Summary"
        },

        "templateJson": {
        }
      }
    };
  </script>
</head>

<body>
  <div id="app">
    <div class="storymap-label">
      Interactive census infographic
    </div>
  </div>
</body>
</html>
